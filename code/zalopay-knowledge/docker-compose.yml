# Local development stack — mirrors AgentBase container contract (port 8080, /health).
# FAISS index + HF cache persist in the named volume across restarts.
#
# Network: egress deny-all + allowlist is enforced at AgentBase VPC in production
# (see deploy/network-policy.md). Local compose does not simulate VPC egress rules.

services:
  mysql:
    image: mysql:8.0
    container_name: zalopay-knowledge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: zalopay
      MYSQL_DATABASE: zalopay_knowledge
      MYSQL_USER: zalopay
      MYSQL_PASSWORD: zalopay
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uzalopay", "-pzalopay"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: zalopay-knowledge:local
    container_name: zalopay-knowledge-agent
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      APP_ENV: local
      INDEX_DIR: /data/index
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # DB_HOST/DB_USER/DB_PASSWORD/DB_NAME come from .env (real VDB endpoint).
      # Uncomment below to use the local mysql service instead:
      # DB_HOST: mysql
      # DB_USER: zalopay
      # DB_PASSWORD: zalopay
      # DB_NAME: zalopay_knowledge
    volumes:
      - faiss-index:/data/index
      - ./corpus/pdfs:/app/corpus/pdfs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

volumes:
  faiss-index:
    name: zalopay-knowledge-faiss-index
  mysql-data:
    name: zalopay-knowledge-mysql-data
